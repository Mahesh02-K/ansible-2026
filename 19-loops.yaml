- name: Installing packages using loops
  hosts: frontend
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.package:
     name: "{{ item.name }}"
     state: "{{ item.state }}"
    loop:
    - { name: 'nginx', state: 'present' }
    - { name: 'zip', state: 'present' }
    - { name: 'mysql', state: 'absent' }