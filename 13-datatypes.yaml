- name: Datatypes
  connection: local
  hosts: local
  vars:
    Course: "DevSecOps with AWS" #string
    Duration: 120 #number
    Trainer: Sivakumar
    Tools: #list []
    - Linux
    - shell
    - ansible
    IS_LIVE: true #boolean
    Concepts: #map or dictionary or object,referred like {} 
      CI: Jenkins
      Scripting: "Ansible, Shell, Terraform, Python"
  tasks:
  - name: print course info
    ansible.builtin.debug:
      msg: "I'm learning {{ Course }}, Duration: {{ Duration }}, IS_LIVE: {{ IS_LIVE }}, and Tools are {{ Tools }}, Concepts: {{ Concepts }}, Trainer is {{ Trainer }}"
